<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raid duality tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .site-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        
        .site-name span {
            color: #ff6b35;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            max-width: 500px;
            margin: 20px auto;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-input:focus {
            border-color: #ff6b35;
        }
        
        .search-input::placeholder {
            color: #666;
        }
        
        .search-btn {
            padding: 12px 24px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .search-btn:hover {
            background: #e55a2b;
        }
        
        .search-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .results-header {
            color: #888;
            font-size: 14px;
            margin: 20px 0;
            text-align: center;
        }
        
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .result-item {
            display: grid;
            grid-template-columns: 1fr 100px 90px 40px;
            gap: 12px;
            align-items: center;
            padding: 10px 16px;
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .result-item:hover {
            background: #1a1a1a;
            border-color: #333;
        }
        
        .result-item.copied {
            border-color: #ff6b35;
            background: #1a0f0a;
        }
        
        .raid-name {
            color: #e0e0e0;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .raid-date {
            color: #888;
            text-align: right;
        }
        
        .raid-time {
            color: #aaa;
            text-align: right;
            font-family: monospace;
        }
        
        .status-icon {
            text-align: center;
            font-size: 16px;
        }
        
        .status-icon.completed {
            color: #4caf50;
        }
        
        .status-icon.incomplete {
            color: #f44336;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error-msg {
            text-align: center;
            padding: 20px;
            color: #f44336;
            background: #1a0000;
            border-radius: 6px;
            border: 1px solid #330000;
        }
        
        .info-text {
            color: #666;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="site-name">d2:<span>re</span></div>
            <div class="subtitle">d2 legit checker</div>
        </div>
        
        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                id="bungieId" 
                placeholder="Bungie ID: name#1234"
                autocomplete="off"
            >
            <button class="search-btn" id="searchBtn" onclick="search()">search</button>
        </div>
        
        <div id="resultsHeader" class="results-header" style="display: none;"></div>
        <div id="resultsContainer"></div>
        
        <div class="info-text">
            Отслеживаются убийства с Duality и Fourth Horseman до 4 июня 2024
        </div>
    </div>
    
    <div class="toast" id="toast">Instance ID скопирован!</div>
    
    <script>
        async function search() {
            const bungieId = document.getElementById('bungieId').value.trim();
            if (!bungieId) {
                alert('Введите Bungie ID');
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            const container = document.getElementById('resultsContainer');
            const header = document.getElementById('resultsHeader');
            
            btn.disabled = true;
            btn.textContent = 'поиск...';
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>Анализирую рейды...</div>';
            header.style.display = 'none';
            
            try {
                const response = await fetch('/textai/raid-checker/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ bungie_id: bungieId })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    container.innerHTML = `<div class="error-msg">${data.error}</div>`;
                } else if (data.results.length === 0) {
                    container.innerHTML = '<div class="no-results">😕 Не найдено рейдов с Duality/Fourth Horseman</div>';
                    header.style.display = 'block';
                    header.textContent = `Проверено рейдов: ${data.total_checked || 0}`;
                } else {
                    header.style.display = 'block';
                    header.textContent = `Найдено ${data.results.length} совпадений | Проверено рейдов: ${data.total_checked || 0}`;
                    renderResults(data.results);
                }
            } catch (err) {
                container.innerHTML = `<div class="error-msg">Ошибка соединения: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'search';
            }
        }
        
        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            
            let html = '<div class="results-list">';
            
            results.forEach((r, i) => {
                const statusClass = r.completed ? 'completed' : 'incomplete';
                const statusIcon = r.completed ? '✅' : '❌';
                
                html += `
                    <div class="result-item" onclick="copyInstance('${r.instance_id}', this)" title="Нажмите чтобы скопировать Instance ID">
                        <div class="raid-name">${i + 1}. ${r.raid_name}: ${r.difficulty}</div>
                        <div class="raid-date">${r.date}</div>
                        <div class="raid-time">${r.time}</div>
                        <div class="status-icon ${statusClass}">${statusIcon}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        function copyInstance(instanceId, element) {
            navigator.clipboard.writeText(instanceId).then(() => {
                // Визуальный фидбек
                element.classList.add('copied');
                setTimeout(() => element.classList.remove('copied'), 300);
                
                // Toast
                const toast = document.getElementById('toast');
                toast.textContent = `Instance ID скопирован: ${instanceId}`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }).catch(() => {
                alert('Instance ID: ' + instanceId);
            });
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
